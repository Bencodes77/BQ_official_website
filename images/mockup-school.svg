<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Inter, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="schBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2a3a"/>
      <stop offset="1" stop-color="#081521"/>
    </linearGradient>
    <linearGradient id="schBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="schAcc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="760" height="520" fill="url(#schBg)"/>

  <!-- sidebar -->
  <rect x="0" y="0" width="72" height="520" fill="#0a1b28"/>
  <rect x="22" y="24" width="30" height="30" rx="9" fill="url(#schAcc)"/>
  <rect x="24" y="96"  width="26" height="26" rx="8" fill="#123047"/>
  <rect x="24" y="140" width="26" height="26" rx="8" fill="url(#schAcc)" opacity="0.9"/>
  <rect x="24" y="184" width="26" height="26" rx="8" fill="#123047"/>
  <rect x="24" y="228" width="26" height="26" rx="8" fill="#123047"/>
  <rect x="24" y="272" width="26" height="26" rx="8" fill="#123047"/>

  <!-- topbar -->
  <text x="98" y="52" fill="#eaf7fb" font-size="22" font-weight="700">Greenhill Academy</text>
  <rect x="470" y="30" width="180" height="30" rx="15" fill="#0f2536" stroke="#1c3b52"/>
  <text x="490" y="50" fill="#6f92a6" font-size="12">Search students…</text>
  <circle cx="702" cy="45" r="17" fill="url(#schAcc)"/>
  <text x="694" y="50" fill="#052430" font-size="13" font-weight="800">GA</text>

  <!-- KPI cards -->
  <g>
    <rect x="98" y="84" width="196" height="86" rx="14" fill="#0f2637" stroke="#1c3b52"/>
    <text x="116" y="112" fill="#7fa2b6" font-size="12">Enrolled</text>
    <text x="116" y="146" fill="#eaf7fb" font-size="27" font-weight="800">1,248</text>
    <text x="230" y="146" fill="#34d399" font-size="12">+4.2%</text>
  </g>
  <g>
    <rect x="308" y="84" width="196" height="86" rx="14" fill="#0f2637" stroke="#1c3b52"/>
    <text x="326" y="112" fill="#7fa2b6" font-size="12">Attendance</text>
    <text x="326" y="146" fill="#eaf7fb" font-size="27" font-weight="800">96%</text>
    <text x="430" y="146" fill="#22d3ee" font-size="12">today</text>
  </g>
  <g>
    <rect x="518" y="84" width="196" height="86" rx="14" fill="#0f2637" stroke="#1c3b52"/>
    <text x="536" y="112" fill="#7fa2b6" font-size="12">Fees</text>
    <text x="536" y="146" fill="#eaf7fb" font-size="27" font-weight="800">87%</text>
    <text x="626" y="146" fill="#f59e0b" font-size="12">42.6M</text>
  </g>

  <!-- bar chart hero -->
  <rect x="98" y="186" width="410" height="214" rx="14" fill="#0f2637" stroke="#1c3b52"/>
  <text x="118" y="216" fill="#cfe6ef" font-size="14" font-weight="600">Attendance by Form</text>
  <line x1="118" y1="252" x2="486" y2="252" stroke="#173247" stroke-dasharray="3 5"/>
  <line x1="118" y1="300" x2="486" y2="300" stroke="#173247" stroke-dasharray="3 5"/>
  <line x1="118" y1="348" x2="486" y2="348" stroke="#173247" stroke-dasharray="3 5"/>
  <g>
    <rect x="132" y="300" width="38" height="80"  rx="6" fill="url(#schBar)"/>
    <rect x="192" y="266" width="38" height="114" rx="6" fill="url(#schBar)"/>
    <rect x="252" y="288" width="38" height="92"  rx="6" fill="url(#schBar)"/>
    <rect x="312" y="242" width="38" height="138" rx="6" fill="url(#schBar)"/>
    <rect x="372" y="284" width="38" height="96"  rx="6" fill="url(#schBar)"/>
    <rect x="432" y="258" width="38" height="122" rx="6" fill="url(#schBar)"/>
    <line x1="118" y1="380" x2="486" y2="380" stroke="#1c3b52"/>
  </g>

  <!-- donut fee status -->
  <rect x="518" y="186" width="196" height="214" rx="14" fill="#0f2637" stroke="#1c3b52"/>
  <text x="536" y="216" fill="#cfe6ef" font-size="14" font-weight="600">Fee Status</text>
  <circle cx="616" cy="300" r="52" fill="none" stroke="#123047" stroke-width="16"/>
  <circle cx="616" cy="300" r="52" fill="none" stroke="url(#schAcc)" stroke-width="16"
          stroke-linecap="round" stroke-dasharray="284 327" transform="rotate(-90 616 300)"/>
  <text x="596" y="306" fill="#eaf7fb" font-size="22" font-weight="800">87%</text>
</svg>

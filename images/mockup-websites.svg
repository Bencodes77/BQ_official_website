<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Inter, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="wsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#231433"/>
      <stop offset="1" stop-color="#120a1e"/>
    </linearGradient>
    <linearGradient id="wsHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="wsBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="760" height="520" fill="url(#wsBg)"/>

  <!-- browser window -->
  <rect x="24" y="26" width="560" height="360" rx="16" fill="#0f0a1c" stroke="#2c2044"/>
  <!-- browser chrome -->
  <rect x="24" y="26" width="560" height="42" rx="16" fill="#1a1230"/>
  <rect x="24" y="52" width="560" height="16" fill="#1a1230"/>
  <circle cx="48" cy="47" r="6" fill="#ff5f56"/>
  <circle cx="70" cy="47" r="6" fill="#ffbd2e"/>
  <circle cx="92" cy="47" r="6" fill="#27c93f"/>
  <rect x="120" y="36" width="360" height="22" rx="11" fill="#0f0a1c" stroke="#2c2044"/>
  <text x="140" y="51" fill="#8b7fb0" font-size="11">www.yourbrand.co.tz</text>

  <!-- website canvas: nav -->
  <text x="52" y="98" fill="#f5ecff" font-size="13" font-weight="800">BRAND</text>
  <g fill="#6d5f92" font-size="10">
    <rect x="360" y="88" width="34" height="8" rx="4"/>
    <rect x="404" y="88" width="34" height="8" rx="4"/>
    <rect x="448" y="88" width="34" height="8" rx="4"/>
  </g>
  <rect x="500" y="84" width="60" height="18" rx="9" fill="url(#wsBtn)"/>

  <!-- website canvas: hero -->

  <rect x="72" y="150" width="150" height="14" rx="7" fill="#ffffff" opacity="0.95"/>
  <rect x="72" y="176" width="210" height="9" rx="4.5" fill="#ffffff" opacity="0.6"/>
  <rect x="72" y="192" width="180" height="9" rx="4.5" fill="#ffffff" opacity="0.6"/>
  <rect x="72" y="222" width="96" height="26" rx="13" fill="#ffffff"/>
  <text x="88" y="239" fill="#7c3aed" font-size="11" font-weight="700">Get Started</text>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Inter, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="cpBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#211a3e"/>
      <stop offset="1" stop-color="#100b22"/>
    </linearGradient>
    <linearGradient id="cpCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="cpSpark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="760" height="520" fill="url(#cpBg)"/>

  <!-- header -->
  <rect x="24" y="26" width="34" height="34" rx="10" fill="url(#cpCard)"/>
  <text x="70" y="49" fill="#f2ecff" font-size="20" font-weight="700">CashPoint Wallet</text>
  <rect x="612" y="30" width="124" height="30" rx="15" fill="#2a2150" stroke="#3b2f6b"/>
  <text x="632" y="50" fill="#c4b5fd" font-size="12" font-weight="600">+ New txn</text>

  <!-- big balance card (glass/gradient — the hero) -->
  <rect x="24" y="82" width="352" height="188" rx="18" fill="url(#cpCard)"/>
  <rect x="24" y="82" width="352" height="188" rx="18" fill="#ffffff" opacity="0.04"/>
  <text x="48" y="120" fill="#e8e0ff" font-size="12.5" opacity="0.9">Total Balance · All Branches</text>
  <text x="48" y="162" fill="#ffffff" font-size="38" font-weight="800">TZS 84.2M</text>
  <text x="48" y="188" fill="#e2d8ff" font-size="12">▲ 6.4% vs last week</text>
  <!-- sparkline inside card -->
  <path d="M48,238 L92,224 L136,232 L180,208 L224,218 L268,196 L312,206 L352,184"
        fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="24" cy="250" r="1"/>
  <rect x="300" y="98" width="56" height="36" rx="7" fill="#ffffff" opacity="0.18"/>

  <!-- two mini metric cards -->
  <g>
    <rect x="392" y="82" width="168" height="88" rx="14" fill="#241d47" stroke="#362c63"/>
    <text x="412" y="110" fill="#a99fce" font-size="12">Cash In</text>
    <text x="412" y="144" fill="#f2ecff" font-size="22" font-weight="800">TZS 12.8M</text>
  </g>
  <g>
    <rect x="568" y="82" width="168" height="88" rx="14" fill="#241d47" stroke="#362c63"/>
    <text x="588" y="110" fill="#a99fce" font-size="12">Cash Out</text>
    <text x="588" y="144" fill="#f2ecff" font-size="22" font-weight="800">TZS 9.1M</text>
  </g>
  <g>
    <rect x="392" y="182" width="344" height="88" rx="14" fill="#241d47" stroke="#362c63"/>
    <text x="412" y="210" fill="#a99fce" font-size="12">Reconciliation</text>
    <text x="412" y="244" fill="#34d399" font-size="22" font-weight="800">Balanced</text>
    <circle cx="700" cy="226" r="22" fill="none" stroke="#2f2657" stroke-width="7"/>
    <circle cx="700" cy="226" r="22" fill="none" stroke="#a78bfa" stroke-width="7" stroke-linecap="round" stroke-dasharray="124 138" transform="rotate(-90 700 226)"/>
  </g>

  <!-- transaction feed -->
  <rect x="24" y="284" width="712" height="150" rx="16" fill="#1b1638" stroke="#2c2456"/>
  <text x="46" y="314" fill="#d9d0f5" font-size="14" font-weight="600">Recent Transactions</text>
  <g font-size="12.5">
    <circle cx="52" cy="346" r="6" fill="#34d399"/>
    <text x="70" y="350" fill="#cabef0">Deposit · Branch 03</text>
    <text x="650" y="350" fill="#a5f3cf" font-weight="700">+540,000</text>
    <circle cx="52" cy="380" r="6" fill="#f472b6"/>
    <text x="70" y="384" fill="#cabef0">Withdrawal · Branch 01</text>
    <text x="650" y="384" fill="#f9a8d4" font-weight="700">−220,000</text>
    <circle cx="52" cy="414" r="6" fill="#a78bfa"/>
    <text x="70" y="418" fill="#cabef0">Transfer · Branch 07</text>
    <text x="650" y="418" fill="#c4b5fd" font-weight="700">+180,000</text>
  </g>
</svg>

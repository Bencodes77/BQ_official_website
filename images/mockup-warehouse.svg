<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Inter, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="whBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2010"/>
      <stop offset="1" stop-color="#161006"/>
    </linearGradient>
    <linearGradient id="whAcc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="760" height="520" fill="url(#whBg)"/>

  <!-- header -->
  <rect x="24" y="26" width="34" height="34" rx="10" fill="url(#whAcc)"/>
  <text x="70" y="49" fill="#fff6e6" font-size="20" font-weight="700">StockFlow Warehouse</text>
  <rect x="590" y="30" width="146" height="30" rx="8" fill="#2e2411" stroke="#4a3a17"/>
  <text x="608" y="50" fill="#f59e0b" font-size="12" font-weight="600">Scan / Add item</text>

  <!-- location chips -->
  <g font-size="12" font-weight="600">
    <rect x="24" y="80" width="120" height="34" rx="17" fill="url(#whAcc)"/>
    <text x="46" y="102" fill="#3a2905">Dar · Main</text>
    <rect x="156" y="80" width="120" height="34" rx="17" fill="#2e2411" stroke="#4a3a17"/>
    <text x="176" y="102" fill="#d8b877">Arusha</text>
    <rect x="288" y="80" width="120" height="34" rx="17" fill="#2e2411" stroke="#4a3a17"/>
    <text x="312" y="102" fill="#d8b877">Mwanza</text>
    <rect x="420" y="80" width="120" height="34" rx="17" fill="#2e2411" stroke="#4a3a17"/>
    <text x="446" y="102" fill="#d8b877">Dodoma</text>
  </g>

  <!-- KPI tiles -->
  <g>
    <rect x="556" y="80" width="180" height="34" rx="8" fill="#2e2411" stroke="#4a3a17"/>
    <text x="574" y="102" fill="#d8b877" font-size="12">SKUs</text>
    <text x="686" y="102" fill="#fff6e6" font-size="14" font-weight="800">3,910</text>
  </g>

  <!-- inventory table (the distinct hero) -->
  <rect x="24" y="128" width="712" height="290" rx="16" fill="#1d1608" stroke="#3a2c11"/>
  <!-- table header -->
  <text x="48"  y="162" fill="#c9a765" font-size="12" font-weight="700">ITEM</text>
  <text x="360" y="162" fill="#c9a765" font-size="12" font-weight="700">SKU</text>
  <text x="500" y="162" fill="#c9a765" font-size="12" font-weight="700">STOCK</text>
  <text x="630" y="162" fill="#c9a765" font-size="12" font-weight="700">STATUS</text>
  <line x1="40" y1="176" x2="720" y2="176" stroke="#3a2c11"/>

  <!-- rows -->
  <g font-size="13">
    <rect x="40" y="188" width="680" height="40" rx="8" fill="#241b0b"/>
    <rect x="52" y="200" width="16" height="16" rx="4" fill="#f59e0b"/>
    <text x="80"  y="213" fill="#f3e6cf">Motor Oil 4L</text>
    <text x="360" y="213" fill="#b79a63">MO-4021</text>
    <text x="500" y="213" fill="#f3e6cf">842</text>
    <rect x="630" y="200" width="72" height="18" rx="9" fill="#16351f"/>
    <text x="644" y="213" fill="#4ade80" font-size="11">In stock</text>

    <rect x="52" y="244" width="16" height="16" rx="4" fill="#fb923c"/>
    <text x="80"  y="257" fill="#f3e6cf">Brake Pads</text>
    <text x="360" y="257" fill="#b79a63">BP-1188</text>
    <text x="500" y="257" fill="#f3e6cf">64</text>
    <rect x="630" y="244" width="72" height="18" rx="9" fill="#3a2c0c"/>
    <text x="644" y="257" fill="#fbbf24" font-size="11">Low</text>

    <rect x="40" y="276" width="680" height="40" rx="8" fill="#241b0b"/>
    <rect x="52" y="288" width="16" height="16" rx="4" fill="#f59e0b"/>
    <text x="80"  y="301" fill="#f3e6cf">Chain Lube</text>
    <text x="360" y="301" fill="#b79a63">CL-3390</text>
    <text x="500" y="301" fill="#f3e6cf">1,204</text>
    <rect x="630" y="288" width="72" height="18" rx="9" fill="#16351f"/>
    <text x="644" y="301" fill="#4ade80" font-size="11">In stock</text>

    <rect x="52" y="332" width="16" height="16" rx="4" fill="#ef4444"/>
    <text x="80"  y="345" fill="#f3e6cf">Air Filter</text>
    <text x="360" y="345" fill="#b79a63">AF-7742</text>
    <text x="500" y="345" fill="#f3e6cf">9</text>
    <rect x="630" y="332" width="86" height="18" rx="9" fill="#3d1414"/>
    <text x="644" y="345" fill="#f87171" font-size="11">Reorder</text>

    <rect x="40" y="364" width="680" height="40" rx="8" fill="#241b0b"/>
    <rect x="52" y="376" width="16" height="16" rx="4" fill="#f59e0b"/>
    <text x="80"  y="389" fill="#f3e6cf">Spark Plugs</text>
    <text x="360" y="389" fill="#b79a63">SP-0561</text>
    <text x="500" y="389" fill="#f3e6cf">560</text>
    <rect x="630" y="376" width="72" height="18" rx="9" fill="#16351f"/>
    <text x="644" y="389" fill="#4ade80" font-size="11">In stock</text>
  </g>
</svg>
